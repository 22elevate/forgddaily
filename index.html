<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgd Daily</title>
  <meta name="description" content="Something is being forged. Coming soon." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #050A14;
      --blue:  #1B6FFF;
      --muted: #6B7E9E;
      --faint: #2A3A55;
      --white: #FFFFFF;
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(27,111,255,0.1) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1;   }
      50%       { transform: scale(1.1); opacity: 0.6; }
    }

    .logo {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 7px;
      color: var(--white);
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }
    .logo span { color: var(--blue); }

    .headline {
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 3px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    /* Animated divider */
    .divider {
      width: 60px;
      height: 2px;
      background: var(--blue);
      border-radius: 2px;
      margin: 0 auto 48px;
      position: relative;
      z-index: 1;
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { width: 40px;  opacity: 0.6; }
      50%       { width: 80px; opacity: 1;   }
    }

    .tagline {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      color: var(--white);
      letter-spacing: 2px;
      line-height: 1.2;
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    footer {
      position: fixed;
      bottom: 32px;
      display: flex;
      gap: 24px;
      font-size: 12px;
    }
    footer a {
      color: var(--faint);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--muted); }
  </style>
</head>
<body>

  <div class="glow"></div>

  <p class="logo">FORGD <span>DAILY</span></p>
  <p class="headline">SOMETHING IS BEING FORGED</p>
  <div class="divider"></div>
  <h1 class="tagline">Coming Soon</h1>
  <p class="sub">In the meantime → <a href="/app" style="color:#1B6FFF;text-decoration:none;">view the app</a></p>

  <footer>
    <a href="/app">App</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
    <a href="mailto:hello@22elevate.com">Contact</a>
  </footer>

</body>
</html>
